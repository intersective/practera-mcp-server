service: practera-mcp-server

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: 'us-east-1'
  memorySize: 1024
  timeout: 30
  logRetentionInDays: 14
  environment:
    NODE_ENV: production
    PRACTERA_CLIENT_ID: ${param:practeraClientId, ''}
    REDIRECT_URI: ${param:redirectUri, ''}
    ISSUER_URL: ${param:issuerUrl, 'https://auth.practera.com'}
    BASE_URL: ${param:baseUrl, ''}
    SESSION_TABLE: ${self:service}-${self:provider.stage}-sessions
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
        - dynamodb:DeleteItem
        - dynamodb:UpdateItem
        - dynamodb:Query
        - dynamodb:Scan
      Resource:
        - Fn::GetAtt: [SessionsTable, Arn]
  
functions:
  mcp:
    handler: dist/server.handler
    url:
      invokeMode: RESPONSE_STREAM
      cors: true
    events:
      - httpApi:
          path: /sse
          method: any
      - httpApi:
          path: /messages
          method: POST
      - httpApi:
          path: /oauth/{proxy+}
          method: any
      - httpApi:
          path: /health
          method: GET

resources:
  Resources:
    SessionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-${self:provider.stage}-sessions
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: sessionId
            AttributeType: S
        KeySchema:
          - AttributeName: sessionId
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

plugins:
  - serverless-offline

package:
  patterns:
    - '!node_modules/.bin/**'
    - '!src/**'
    - '!.gitignore'
    - '!.git/**'
    - '!*.log'
    - '!*.md'
    - 'dist/**'
    - 'node_modules/**'

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true 