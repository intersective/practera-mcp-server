service: practera-mcp-server

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: 'us-east-1'
  memorySize: 1024
  timeout: 30
  logRetentionInDays: 14
  environment:
    NODE_ENV: production
    PRACTERA_CLIENT_ID: ${param:practeraClientId, ''}
    REDIRECT_URI: ${param:redirectUri, ''}
    ISSUER_URL: ${param:issuerUrl, 'https://auth.practera.com'}
    BASE_URL: ${param:baseUrl, ''}
  
functions:
  # NOTE: dist/server.handler does NOT exist — server.ts starts an Express process directly.
  # For Lambda deployment, a serverless-http or @vendia/serverless-express adapter is needed.
  # Until that adapter is added, deploy this service as a standalone Express process (ECS/EC2/App Runner)
  # or via the stdio transport only (Cursor local spawn mode).
  mcp:
    handler: dist/server.handler  # TODO: wrap with serverless-http before deploying to Lambda
    events:
      - httpApi:
          path: /sse
          method: ANY
      - httpApi:
          path: /messages
          method: POST
      - httpApi:
          path: /health
          method: GET

plugins:
  - serverless-offline

package:
  patterns:
    - '!node_modules/.bin/**'
    - '!src/**'
    - '!.gitignore'
    - '!.git/**'
    - '!*.log'
    - '!*.md'
    - 'dist/**'
    - 'node_modules/**'
    - 'src/data/**'

custom:
  serverless-offline:
    httpPort: 3000
    noPrependStageInUrl: true 